<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Estoque</title>
    <link rel="stylesheet" th:href="@{/css/estoque.css}">
    <link rel="stylesheet" th:href="@{/css/fragments.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <div th:replace="~{fragments/fragments :: barra-lateral}"></div>
    <div class="main">

        <div th:replace="~{fragments/fragments :: cabecalho}"></div>

        <section class="conteudo">

            <h1 class="titulo-pagina">Estoque</h1>

            <section class="cards">
                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-boxes card-icon"></i>
                        <h3>Total de Produtos</h3>
                    </div>
                    <p id="valor-totalProdutos"></p>
                </div>

                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-exclamation-triangle card-icon"></i>
                        <h3>Estoque Baixo</h3>
                    </div>
                    <p id="valor-estoque-baixo"></p>
                </div>

                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-clock-history card-icon"></i>
                        <h3>Vencidos</h3>
                    </div>
                    <p id="valor-vencidos"></p>
                </div>

                <div class="card">
                    <div class="card-header">
                        <i class="bi bi-currency-dollar card-icon"></i>
                        <h3>Valor Total</h3>
                    </div>
                    <p id="valor-valor-total"></p>
                </div>
            </section>

            <section class="barra-acoes">

                <input type="text" placeholder="Buscar produto..." class="input-busca" id="filtro-produto">
                <select class="filtro-status">
                    <option value="">Todos</option>
                    <option value="NORMAL">Normal</option>
                    <option value="BAIXO">Estoque Baixo</option>
                    <option value="VENCIDO">Vencido</option>
                </select>

                <button class="btn-limpar-filtro"><i class="bi bi-eraser-fill"></i> Limpar filtros</button>
                <a th:href="@{/produtos/cadastrar}">
                    <button class="btn-novo-produto">+ Novo Produto</button>
                </a>

            </section>

            <section class="tabela-produtos">

                <table id="tabela-produtos">

                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Quantidade</th>
                            <th>Descrição</th>
                            <th>Estoque Mínimo</th>
                            <th>Valor</th>
                            <th>Validade</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>

            </section>

            <section class="rodape-tabela">

                <p id="texto-mostrando-produtos"></p>

                <div class="paginacao">
                    <button onclick="moverAtivoMenos()">&lt;</button>
                    <button id="btn1" onclick="selecionarBotao(this)">1</button>
                    <button id="btn2" onclick="selecionarBotao(this)">2</button>
                    <button id="btn3" onclick="selecionarBotao(this)">3</button>
                    <span>...</span>
                    <button id="btn4" onclick="selecionarBotao(this)"></button>
                    <button onclick="moverAtivoMais()">&gt;</button>
                </div>

            </section>

        </section>
        </div>
        <div id="modal-lote" class="modal-lote">

        <div class="modal-content">

            <div class="modal-header">
                <h2>Cadastrar Lote</h2>
                <button class="btn-fechar" onclick="fecharModalLote()">✖</button>
            </div>

            <form id="form-lote">

                <input type="hidden" id="produtoId">

                <div class="form-group">
                    <label>Produto</label>
                    <input type="text" id="produtoNome" disabled>
                </div>

                <div class="form-group">
                    <label>Quantidade</label>
                    <input type="number" id="quantidadeLote" min="1" required>
                </div>

                <div class="form-group">
                    <label>Validade</label>
                    <input type="date" id="validadeLote">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancelar" onclick="fecharModalLote()">Cancelar</button>
                    <button type="submit" class="btn-salvar">Salvar</button>
                </div>

            </form>
        </div>
        </div>
    </div>
</body>
<script th:src="@{/js/home.js}"></script>
<script th:src="@{/js/estoque.js}"></script>
</body>

</html>
