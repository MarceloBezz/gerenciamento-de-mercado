<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balanço Financeiro</title>
    <link rel="stylesheet" th:href="@{/css/fragments.css}">
    <link rel="stylesheet" th:href="@{/css/balanco-financeiro.css}">
</head>

<body>
    <div th:replace="~{fragments/fragments :: barra-lateral}"></div>
    <div class="main">

        <div th:replace="~{fragments/fragments :: cabecalho}"></div>

        <section class="cards">
            <div class="card">
                <h3>Entrada total</h3>
                <p></p>
            </div>

            <div class="card">
                <h3>Saída total</h3>
                <p></p>
            </div>

            <div class="card">
                <h3>Lucro:</h3>
                <p></p>
            </div>

            <div class="card">
                <h3>Produtos vendidos</h3>
                <p></p>
            </div>
        </section>
        <section class="filtros-financeiros">

            <!-- <div class="filtro">
                <label for="periodo">Período</label>
                <select id="periodo">
                    <option value="todos">Todos</option>
                    <option value="mensal">Mensal</option>
                    <option value="semanal">Semanal</option>
                </select>
            </div> -->

            <div class="filtro">
                <label for="mes">Mês</label>
                <select id="mes">
                    <option>Janeiro</option>
                    <option>Fevereiro</option>
                    <option>Março</option>
                    <option>Abril</option>
                    <option>Maio</option>
                    <option>Junho</option>
                    <option>Julho</option>
                    <option>Agosto</option>
                    <option>Setembro</option>
                    <option>Outubro</option>
                    <option>Novembro</option>
                    <option>Dezembro</option>
                </select>
            </div>

            <div class="filtro">
                <label for="semana">Semana</label>
                <select id="semana">
                    <option value="1">Semana 1</option>
                    <option value="2">Semana 2</option>
                    <option value="3">Semana 3</option>
                    <option value="4">Semana 4</option>
                </select>
            </div>

            <div class="filtro">
                <label for="vendedor">Vendedor</label>
                <select id="vendedor">
                    <option>Todos</option>
                    <option>João</option>
                    <option>Maria</option>
                    <option>Carlos</option>
                    <option>Ana</option>
                </select>
            </div>

            <button class="btn-filtrar">Filtrar</button>

        </section>

        <section class="graficos-financeiros">

            <div class="grafico-container">
                <h3>Entradas vs Saídas por semana</h3>
                <canvas id="graficoEntradasSaidas"></canvas>
            </div>

            <div class="grafico-container">
                <h3>Faturamento por vendedor</h3>
                <canvas id="graficoVendedores"></canvas>
            </div>

            <div class="grafico-container">
                <h3>Produtos vendidos por semana</h3>
                <canvas id="graficoProdutos"></canvas>
            </div>

            <div class="grafico-container">
                <h3>Lucro Mensal</h3>
                <canvas id="graficoLucro"></canvas>
            </div>

            <div class="grafico-container">
                <h3>Participação dos vendedores</h3>
                <canvas id="graficoParticipacao"></canvas>
            </div>

        </section>

    </div>
    <script th:src="@{https://cdn.jsdelivr.net/npm/chart.js}"></script>
    <script th:src="@{/js/balanco-financeiro.js}"></script>
</body>

</html>
