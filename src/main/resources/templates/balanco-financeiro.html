<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balanço Financeiro</title>
    <link rel="stylesheet" th:href="@{/css/fragments.css}">
    <link rel="stylesheet" th:href="@{/css/balanco-financeiro.css}">
    <link rel="icon" type="image/png" th:href="@{/img/logo.png}">
</head>

<body>
    <div th:replace="~{fragments/fragments :: barra-lateral}"></div>
    <div class="main">

        <div th:replace="~{fragments/fragments :: cabecalho}"></div>

        <section class="cards">
            <div class="card">
                <h3>Entrada total</h3>
                <p id="totalEntradas">...</p>
            </div>

            <div class="card">
                <h3>Saída total</h3>
                <p id="totalSaidas">...</p>
            </div>

            <div class="card">
                <h3>Lucro:</h3>
                <p id="totalLucro">...</p>
            </div>

            <div class="card">
                <h3>Produtos vendidos</h3>
                <p id="totalProdutosVendidos">...</p>
            </div>
        </section>
        <section class="filtros-financeiros">

            <div class="filtro-filtrar-por">
                <label>
                    <input type="checkbox" id="filtrarPor"> Filtrar por:
                </label>
            </div>

            <div class="filtro">
                <label for="mes">Mês</label>
                <select id="mes" disabled>
                    <option value="1">Janeiro</option>
                    <option value="2">Fevereiro</option>
                    <option value="3">Março</option>
                    <option value="4">Abril</option>
                    <option value="5">Maio</option>
                    <option value="6">Junho</option>
                    <option value="7">Julho</option>
                    <option value="8">Agosto</option>
                    <option value="9">Setembro</option>
                    <option value="10">Outubro</option>
                    <option value="11">Novembro</option>
                    <option value="12">Dezembro</option>
                </select>
            </div>

            <div class="filtro">
                <label for="ano">Ano</label>
                <input id="ano" type="number" min="2000" max="2100" value="${T(java.time.LocalDate).now().year}" disabled />
            </div>

            <button class="btn-filtrar" type="button">Filtrar</button>

        </section>

        <section class="graficos-financeiros">

            <div class="grafico-container">
                <h3>Entradas vs Saídas por semana</h3>
                <canvas id="graficoEntradasSaidas"></canvas>
            </div>

            <div class="grafico-container">
                <h3>Faturamento por vendedor</h3>
                <canvas id="graficoVendedores"></canvas>
            </div>

            <div class="grafico-container">
                <h3>Produtos vendidos por semana</h3>
                <canvas id="graficoProdutos"></canvas>
            </div>

            <div class="grafico-container">
                <h3>Lucro Mensal</h3>
                <canvas id="graficoLucro"></canvas>
            </div>

            <div class="grafico-container">
                <h3>Participação dos vendedores</h3>
                <canvas id="graficoParticipacao"></canvas>
            </div>

        </section>

    </div>
    <script th:src="@{https://cdn.jsdelivr.net/npm/chart.js}"></script>
    <script th:src="@{/js/balanco-financeiro.js}"></script>
</body>

</html>
