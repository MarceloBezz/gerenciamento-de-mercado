<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Meus Dados</title>


    <link rel="stylesheet" th:href="@{/css/meus-dados.css}">
</head>

<body>

<div class="container">
    <div class="card">
        <h2>Meus Dados</h2>

        <form th:action="@{/funcionarios/atualizar}" method="post" th:object="${usuarioDTO}">

            <input type="text" th:value="${usuario.usuario.id}" hidden>
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" th:field="*{nome}" readonly>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" th:field="*{email}" required>
            </div>

            <div class="form-group">
                <label for="cargo">Cargo</label>
                <input type="text" id="cargo" name="cargo" th:field="*{cargo}" readonly>
            </div>

            <hr>

            <h4>Alterar senha</h4>

            <div class="form-group">
                <label for="senha">Nova senha</label>
                <input type="password" id="senha" name="senha">
            </div>

            <button type="submit" class="btn-salvar">Salvar alterações</button>
        </form>
    </div>
</div>

</body>
</html>
