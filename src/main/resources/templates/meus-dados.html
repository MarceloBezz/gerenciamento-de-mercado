<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8">
    <title>Meus Dados</title>
    <link rel="stylesheet" th:href="@{/css/meus-dados.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <a th:href="@{/home}" class="btn-voltar">
        ← Voltar ao menu principal
    </a>

    <div th:if="${sucesso}">
        <!-- <div class="alert alert-success" role="alert">
            Usuário atualizado com sucesso!
        </div> -->
        <div th:if="${sucesso}" id="alert-sucesso" class="alert-sucesso">
            <span th:text="${sucesso}"></span>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h2>Meus Dados</h2>

            <form th:action="@{/funcionarios/atualizar}" method="post" th:object="${usuarioDTO}">

                <input th:field="${usuario.id}" hidden>
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" th:field="*{nome}" disabled>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" th:field="*{email}" disabled>

                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="chkEmail">
                    <label for="chkEmail">Alterar Email</label>
                </div>

                <div class="form-group">
                    <label for="cargo">Cargo</label>
                    <input type="text" id="cargo" name="cargo" th:field="*{cargo}" disabled>
                </div>

                <hr>

                <h4>Alterar senha</h4>

                <div class="form-group">
                    <label for="senha">Nova senha</label>
                    <input type="password" id="senha" name="senha" th:field="*{senha}">
                </div>

                <button type="submit" class="btn-salvar">Salvar alterações</button>
            </form>
        </div>
    </div>

    <script th:src="@{/js/meus-dados.js}"></script>
</body>

</html>
