<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Funcionários</title>
    <link rel="stylesheet" th:href="@{/css/fragments.css}">
    <link rel="stylesheet" th:href="@{/css/gerenciar-funcionarios.css}">
    <link rel="icon" type="image/png" th:href="@{/img/logo.png}">
</head>

<body>
    <div th:replace="~{fragments/fragments :: barra-lateral}"></div>
    <div class="main">

        <div th:replace="~{fragments/fragments :: cabecalho}"></div>

        <div class="content">

            <div class="header">
                <h1>Funcionários</h1>

                <a th:href="@{/funcionarios/cadastrar}">
                    <button class="btn">+ Novo Funcionário</button>
                </a>
            </div>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Cargo</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="funcionario : ${funcionarios}">
                            <td th:text="${funcionario.nome}"></td>
                            <td th:text="${funcionario.email}"></td>
                            <td th:text="${funcionario.cargo}"></td>

                            <td class="actions">
                                <a th:href="@{/funcionarios/editar/{id}(id=${funcionario.id})}">
                                    Editar
                                </a>

                                <form th:action="@{/funcionarios/deletar/{id}(id=${funcionario.id})}" method="post"
                                    style="display:inline;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit">Excluir</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
    <script th:src="@{/js/home.js}"></script>
    <script th:src="@{/js/gerenciar-funcionarios.js}"></script>
</body>

</html>
