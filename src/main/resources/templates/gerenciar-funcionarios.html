<body xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Funcionários</title>
    <link rel="stylesheet" th:href="@{/css/gerenciar-funcionarios.css}">
</head>
<div class="sidebar">
    <h2>Sistema de ERP</h2>
    <a href="/estoque">Estoque</a>
    <a href="/produtos/cadastrar">Cadastrar Produto</a>
    <a href="/caixa">Caixa</a>
    <a href="/funcionarios">Gerenciar funcionários</a>
    <a href="/balanco-fianceiro">Balanço financeiro</a>
    <a href="/vendas">vendas</a>
</div>

<div class="content">

    <div class="header">
        <h1>Funcionários</h1>

        <a th:href="@{/funcionarios/cadastrar}">
            <button class="btn">+ Novo Funcionário</button>
        </a>
    </div>

    <div class="card">
        <table>
            <thead>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Cargo</th>
                <th>Ações</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="funcionario : ${funcionarios}">
                <td th:text="${funcionario.nome}"></td>
                <td th:text="${funcionario.email}"></td>
                <td th:text="${funcionario.cargo}"></td>

                <td class="actions">
                    <a th:href="@{/funcionarios/editar/{id}(id=${funcionario.id})}">
                        Editar
                    </a>

                    <form th:action="@{/funcionarios/deletar/{id}(id=${funcionario.id})}"
                          method="post"
                          style="display:inline;">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit">Excluir</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
