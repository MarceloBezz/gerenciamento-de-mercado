<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" 
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/fragments.css}">
    

</head>

<body>

    <div th:replace="~{fragments/fragments :: barra-lateral}"></div>

    <!-- Conteúdo principal -->
    <div class="main">

        <div th:replace="~{fragments/fragments :: cabecalho}"></div>

    

        </section>
        <div id="carouselExampleControls" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                <img th:src="@{/img/carrossel1.png}" class="d-block w-100" alt="carrousel-img1">
                </div>
                <div class="carousel-item">
                <img th:src="@{/img/carrossel2.png}" class="d-block w-100" alt="carrousel-img2">
                </div>
                <div class="carousel-item">
                <img th:src="@{/img/carrossel3.png}" class="d-block w-100" alt="carrousel-img2">
                </div>
                <div class="carousel-item">
                <img th:src="@{/img/carrossel4.png}" class="d-block w-100" alt="carrousel-img2">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
        

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script th:src="@{/js/home.js}"></script>
</body>

</html>
