<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" th:href="@{/css/home.css}">
    <link rel="stylesheet" th:href="@{/css/fragments.css}">
</head>

<body>

    <div th:replace="~{fragments/fragments :: barra-lateral}"></div>

    <!-- Conteúdo principal -->
    <div class="main">

        <div th:replace="~{fragments/fragments :: cabecalho}"></div>

        <!-- Cards -->
        <section class="cards">

            <div class="card">
                <h3>Título</h3>
                <p>Valor</p>
            </div>

            <div class="card">
                <h3>Título</h3>
                <p>Valor</p>
            </div>

            <div class="card">
                <h3>Título</h3>
                <p>Valor</p>
            </div>

            <div class="card">
                <h3>Título</h3>
                <p>Valor</p>
            </div>

        </section>

        <!-- Tabela -->
        <section class="table-section">

            <h2>Registros recentes</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Status</th>
                        <th>Valor</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>#</td>
                        <td>---</td>
                        <td><span class="status ok">OK</span></td>
                        <td>---</td>
                    </tr>

                    <tr>
                        <td>#</td>
                        <td>---</td>
                        <td><span class="status pending">Pendente</span></td>
                        <td>---</td>
                    </tr>
                </tbody>

            </table>

        </section>

    </div>
    <script th:src="@{/js/home.js}"></script>
</body>

</html>
